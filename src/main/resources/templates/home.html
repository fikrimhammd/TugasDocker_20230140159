<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Tugas Docker</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📚 MY WEBSITE <span th:text="${nimKamu}"></span></h1>
            <p>Selamat datang di aplikasi!</p>
            <p class="identity">👤 <strong th:text="${namaKamu}"></strong> | NIM: <strong th:text="${nimKamu}"></strong></p>
        </div>

        <div class="actions">
            <a href="/form" class="btn-primary">➕ Input Data Mahasiswa</a>
            <a href="/logout" class="btn-logout">🚪 Logout</a>
        </div>

        <h2>📋 Data Mahasiswa</h2>

        <div th:if="${mahasiswaList.isEmpty()}" class="empty-state">
            <p>⚠️ Belum ada data mahasiswa. Silakan input data terlebih dahulu!</p>
        </div>

        <table th:if="not ${mahasiswaList.isEmpty()}">
            <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jenis Kelamin</th>
                <th>Program Studi</th>
                <th>Angkatan</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="mhs, iter : ${mahasiswaList}">
                <td th:text="${iter.index + 1}"></td>
                <td th:text="${mhs.nama}"></td>
                <td th:text="${mhs.nim}"></td>
                <td th:text="${mhs.jenisKelamin}"></td>
                <td th:text="${mhs.programStudi}"></td>
                <td th:text="${mhs.angkatan}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
