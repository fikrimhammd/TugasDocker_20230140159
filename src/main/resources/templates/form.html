<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Input - Tugas Docker</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📝 Form Input Mahasiswa</h1>
            <p class="identity">NIM: <strong th:text="${nimKamu}"></strong> | Tugas Docker</p>
        </div>

        <form method="post" action="/submit">
            <div class="form-group">
                <label>Nama Lengkap <span class="required">*</span></label>
                <input type="text" name="nama" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="form-group">
                <label>NIM <span class="required">*</span></label>
                <input type="text" name="nim" placeholder="Masukkan NIM" required>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin <span class="required">*</span></label>
                <select name="jenisKelamin" required>
                    <option value="">Pilih</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="form-group">
                <label>Program Studi</label>
                <input type="text" name="programStudi" placeholder="Contoh: Teknik Informatika">
            </div>

            <div class="form-group">
                <label>Angkatan</label>
                <input type="text" name="angkatan" placeholder="Contoh: 2024">
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">💾 Simpan Data</button>
                <a href="/home" class="btn-back">⬅ Kembali</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
